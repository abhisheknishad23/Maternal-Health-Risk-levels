<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women Health Care Analysis</title>
    <!-- Bootstrap 5 for Professional Styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card-header { border-top-left-radius: 15px !important; border-top-right-radius: 15px !important; font-weight: 600; }
        .btn-predict { padding: 12px; font-weight: bold; border-radius: 8px; }
        .result-box { border-radius: 10px; padding: 15px; font-size: 1.2rem; font-weight: bold; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-dark mb-5 shadow">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-heart-pulse text-danger me-2"></i> Women Health Care Analysis Platform</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Maternal Health Card -->
            <div class="col-lg-6 mb-4">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3><i class="fa-solid fa-person-pregnant me-2"></i> Maternal Health Risk Predictor</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="maternalForm">
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Age (Years)</label><input type="number" name="age" class="form-control" value="0" placeholder="Enter Age" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Diastolic BP (mmHg)</label><input type="number" name="diastolic_bp" class="form-control" value="0.0" placeholder="Enter BP" required></div>
                            </div>
                            <div class="mb-3"><label class="form-label fw-semibold">Blood Sugar - BS (mmol/L)</label><input type="number" step="0.1" name="bs" class="form-control" value="0.0" placeholder="Enter BS" required></div>
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Body Temperature (°F)</label><input type="number" step="0.1" name="body_temp" class="form-control" value="0.0" placeholder="Enter BT" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Heart Rate (bpm)</label><input type="number" name="heart_rate" class="form-control" value="0" placeholder="Enter HR" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-predict mt-2"><i class="fa-solid fa-gauge me-2"></i> Analyze Maternal Risk</button>
                        </form>
                        <div id="maternalResult" class="result-box text-center shadow-sm"></div>
                    </div>
                </div>
            </div>

            <!-- Fetal Health Card -->
            <div class="col-lg-6 mb-4">
                <div class="card shadow-lg">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h3><i class="fa-solid fa-baby me-2"></i> Fetal Health CTG Classifier</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="fetalForm">
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Baseline FHR (bpm)</label><input type="number" name="baseline_value" class="form-control" value="0" placeholder="Enter FHR" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Accelerations (per sec)</label><input type="number" step="0.001" name="accelerations" class="form-control" value="0.000" placeholder="Enter Accelerations" required></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Fetal Movement (per sec)</label><input type="number" step="0.001" name="fetal_movement" class="form-control" value="0.000" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Uterine Contractions (/s)</label><input type="number" step="0.001" name="uterine_contractions" class="form-control" value="0.000" required></div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 btn-predict mt-4"><i class="fa-solid fa-wand-magic-sparkles me-2"></i> Classify Fetal Status</button>
                        </form>
                        <div id="fetalResult" class="result-box text-center shadow-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Professional Dynamic Alert Handling Script -->
    <script>
        function getAlertClass(status) {
            status = status.toLowerCase();
            if (status.includes('high') || status.includes('pathological')) return 'alert-danger text-danger border-danger';
            if (status.includes('mid') || status.includes('suspect')) return 'alert-warning text-warning border-warning';
            return 'alert-success text-success border-success';
        }

        function getIcon(status) {
            status = status.toLowerCase();
            if (status.includes('high') || status.includes('pathological')) return '<i class="fa-solid fa-triangle-exclamation me-2"></i>';
            if (status.includes('mid') || status.includes('suspect')) return '<i class="fa-solid fa-circle-exclamation me-2"></i>';
            return '<i class="fa-solid fa-circle-check me-2"></i>';
        }

        $('#maternalForm').on('submit', function(e) {
            e.preventDefault();
            var $result = $('#maternalResult');
            $.post('/predict_maternal', $(this).serialize(), function(data) {
                if(data.status === 'success') {
                    $result.attr('class', 'result-box alert ' + getAlertClass(data.result))
                           .html(getIcon(data.result) + "Diagnostic Result: <strong>" + data.result + "</strong><br><small class='d-block mt-2'><strong>Advice:</strong> " + data.action + "</small>")
                           .fadeIn();
                } else {
                    $result.attr('class', 'result-box alert alert-secondary').text("Error: " + data.message).fadeIn();
                }
            });
        });

        $('#fetalForm').on('submit', function(e) {
            e.preventDefault();
            var $result = $('#fetalResult');
            $.post('/predict_fetal', $(this).serialize(), function(data) {
                if(data.status === 'success') {
                    $result.attr('class', 'result-box alert ' + getAlertClass(data.result))
                           .html(getIcon(data.result) + "Fetal Health Condition: <strong>" + data.result + "</strong><br><small class='d-block mt-2'><strong>Advice:</strong> " + data.action + "</small>")
                           .fadeIn();
                } else {
                    $result.attr('class', 'result-box alert alert-secondary').text("Error: " + data.message).fadeIn();
                }
            });
        });
    </script>
</body>
</html>
